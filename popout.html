<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎴 彈出視窗</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* 彈出頁面專用樣式 */
        body {
            padding: 0;
            margin: 0;
        }

        .popout-page {
            min-height: 100vh;
            padding: var(--spacing-md);
        }

        .popout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: var(--spacing-lg);
            border-radius: var(--radius-lg);
        }

        .popout-header h1 {
            margin: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--success-glow);
            color: var(--success);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
        }

        .sync-indicator.syncing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .popout-content {
            min-height: 50vh;
        }

        /* 內容區域卡片樣式調整 */
        .popout-content .card {
            margin-bottom: 0;
        }

        .popout-content .chart-card {
            height: auto;
        }

        .popout-content .chart-container {
            height: 500px;
        }

        .popout-content .table-container {
            max-height: 70vh;
            overflow: auto;
        }

        .popout-content .stats-grid {
            margin-bottom: 0;
        }

        /* OBS 模式 - 透明背景 */
        body.obs-mode {
            background: transparent !important;
        }

        body.obs-mode .popout-page {
            background: transparent !important;
            padding: var(--spacing-sm);
        }

        body.obs-mode .popout-header {
            display: none !important;
        }

        body.obs-mode .card {
            background: rgba(10, 10, 20, 0.85) !important;
            backdrop-filter: blur(10px);
        }

        body.obs-mode .stats-grid {
            gap: var(--spacing-sm);
        }

        body.obs-mode .stat-card {
            padding: var(--spacing-sm);
        }

        /* OBS 精簡模式 - 只顯示關鍵數據 */
        body.obs-compact .popout-page {
            padding: var(--spacing-xs);
        }

        body.obs-compact .card {
            border-radius: var(--radius-md);
        }

        body.obs-compact .table-container {
            max-height: 50vh;
        }

        body.obs-compact th,
        body.obs-compact td {
            padding: var(--spacing-xs) var(--spacing-sm);
            font-size: 0.9rem;
        }

        /* 縮小欄位設定 Modal (30% smaller) */
        #column-settings-modal .modal-content {
            transform: scale(0.7);
            transform-origin: center center;
            width: 800px;
            /* Force wider width to fit more columns */
            max-width: 95vw;
        }
    </style>
</head>

<body>
    <div class="popout-page">
        <!-- 頁面標題 (OBS 模式下隱藏) -->
        <header class="popout-header">
            <h1 id="popout-title">載入中...</h1>
            <div class="sync-indicator" id="sync-indicator">
                <span>🔄</span>
                <span data-i18n="text_synced">已同步</span>
            </div>
            <button id="toggle-simple-stats-btn" class="btn btn-secondary btn-sm" style="display: none;">
                📋 <span data-i18n="btn_simple_display">簡易顯示</span>
            </button>
        </header>

        <!-- 動態內容區 -->
        <div class="popout-content" id="popout-content">
            <!-- 根據 block 參數動態渲染 -->
        </div>
    </div>

    <!-- 欄位設定 Modal -->
    <div id="column-settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="modal_column_settings_title">欄位顯示設定</h3>
                <button class="modal-close" id="close-column-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="row-height-settings">
                    <label data-i18n="label_row_height">行距設定</label>
                    <div class="btn-group" id="row-height-options">
                        <button class="btn btn-sm btn-ghost" data-height="slim" data-i18n="opt_row_slim">緊湊</button>
                        <button class="btn btn-sm btn-ghost" data-height="normal" data-i18n="opt_row_normal">標準</button>
                        <button class="btn btn-sm btn-ghost" data-height="spacious"
                            data-i18n="opt_row_spacious">寬鬆</button>
                    </div>
                </div>
                <hr style="margin: var(--spacing-md) 0; border: none; border-top: 1px solid var(--border-color);">
                <div id="column-checkbox-list" class="column-toggles-grid">
                    <!-- 動態渲染欄位勾選框 -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="reset-columns-btn" class="btn btn-ghost" data-i18n="btn_reset_default"
                    style="margin-right: auto;">恢復預設</button>
                <button id="confirm-columns-btn" class="btn btn-primary" data-i18n="btn_save_changes">套用設定</button>
            </div>
        </div>
    </div>

    <!-- 編輯對話框 (Modal) -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="modal_edit_title">編輯紀錄</h3>
                <button id="close-edit-modal-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="edit-battle-date" data-i18n="label_date">📅 對戰日期</label>
                            <input type="date" id="edit-battle-date">
                        </div>
                        <div class="form-group">
                            <label for="edit-my-deck" data-i18n="label_my_deck">🎴 己方牌組</label>
                            <input type="text" id="edit-my-deck" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-opponent-deck" data-i18n="label_opponent_deck">🎴 對手牌組</label>
                            <input type="text" id="edit-opponent-deck" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-turn-order" data-i18n="label_turn_order">🔄 先後手</label>
                            <select id="edit-turn-order">
                                <option value="" data-i18n="opt_not_selected">未選擇</option>
                                <option value="先手" data-i18n="opt_first">先手</option>
                                <option value="後手" data-i18n="opt_second">後手</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-result" data-i18n="label_result">🏆 勝負</label>
                            <select id="edit-result">
                                <option value="" data-i18n="opt_not_selected">未選擇</option>
                                <option value="勝利" data-i18n="opt_win">勝利</option>
                                <option value="敗北" data-i18n="opt_lose">敗北</option>
                                <option value="平手" data-i18n="opt_draw">平手</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-score" data-i18n="label_score">📊 當前分數</label>
                            <input type="number" id="edit-score">
                        </div>
                        <div class="form-group">
                            <label for="edit-misplay" data-i18n="label_misplay">⚠️ 渣操等級</label>
                            <select id="edit-misplay">
                                <option value="" data-i18n="opt_not_selected">未選擇</option>
                                <option value="無" data-i18n="opt_none">無</option>
                                <option value="輕度" data-i18n="opt_light">輕度</option>
                                <option value="中等" data-i18n="opt_medium">中等</option>
                                <option value="嚴重" data-i18n="opt_severe">嚴重</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-misplay-note" data-i18n="label_misplay_note">📝 渣操備註</label>
                            <input type="text" id="edit-misplay-note">
                        </div>
                        <div class="form-group">
                            <label for="edit-game-name" data-i18n="label_game_name">🎮 遊戲名稱</label>
                            <input type="text" id="edit-game-name">
                        </div>
                        <div class="form-group">
                            <label for="edit-notes" data-i18n="label_notes">💬 備註</label>
                            <input type="text" id="edit-notes">
                        </div>
                    </div>
                    <div id="edit-custom-fields-container" class="custom-fields-container"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="cancel-edit-btn" class="btn btn-ghost" data-i18n="btn_cancel">取消</button>
                <button id="confirm-edit-btn" class="btn btn-primary" data-i18n="btn_save_changes">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 Modal -->
    <div id="delete-modal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 data-i18n="modal_delete_title">確認刪除</h3>
                <button id="close-delete-modal-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center; padding: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
                <p data-i18n="modal_delete_confirm">確定要刪除這筆紀錄嗎？此動作無法復原。</p>
            </div>
            <div class="modal-footer">
                <button id="cancel-delete-btn" class="btn btn-ghost" data-i18n="btn_cancel">取消</button>
                <button id="confirm-delete-btn" class="btn btn-danger" data-i18n="btn_confirm_delete">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- 匯入選擇 Modal -->
    <div id="import-choice-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="modal_import_title">匯入選項</h3>
                <button class="modal-close" id="close-import-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p data-i18n="modal_import_desc">請選擇匯入模式：</p>
                <div class="import-options">
                    <button id="import-append-btn" class="btn btn-primary import-option-btn">
                        <span class="icon">➕</span>
                        <div class="text">
                            <span class="title" data-i18n="btn_import_append">加入現有資料</span>
                            <span class="desc" data-i18n="desc_import_append">保留目前紀錄，新增匯入的資料</span>
                        </div>
                    </button>
                    <button id="import-replace-btn" class="btn btn-danger import-option-btn">
                        <span class="icon">📂</span>
                        <div class="text">
                            <span class="title" data-i18n="btn_import_replace">開啟選擇資料</span>
                            <span class="desc" data-i18n="desc_import_replace">清空目前紀錄，僅載入匯入的資料</span>
                        </div>
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-import-btn" class="btn btn-ghost" data-i18n="btn_cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- JavaScript 模組 -->
    <script src="modules/i18n.js"></script>
    <script src="modules/dataManager.js"></script>
    <script src="modules/syncManager.js"></script>
    <script src="modules/chartManager.js"></script>
    <script src="modules/tableManager.js"></script>
    <script src="modules/searchManager.js"></script>
    <script>
        /**
         * 彈出頁面控制器
         */
        (function () {
            'use strict';

            // 判斷是否為先手（先手 OR 被讓先）
            const isFirst = t => t === '先手' || t === '被讓先';
            const isSecond = t => t === '後手';

            // 全域錯誤捕獲，幫助偵錯
            window.onerror = function(msg, url, line, col, error) {
                // 忽略跨域腳本錯誤 (CDN 載入的 Chart.js 等)
                // "Script error." with line=0, col=0 是典型的跨域錯誤，沒有實質內容
                if (msg === 'Script error.' || (line === 0 && col === 0)) {
                    console.warn('[Popout] Cross-origin script error (ignored):', msg);
                    return true; // 阻止錯誤繼續傳播
                }
                const content = document.getElementById('popout-content');
                if (content) {
                    content.innerHTML = `
                        <div class="card" style="padding: 2rem; color: var(--danger); text-align: center;">
                            <h3>❌ JavaScript 執行錯誤</h3>
                            <p>${msg}</p>
                            <p style="font-size:0.8rem; color:var(--text-muted);">Line: ${line}, Col: ${col}</p>
                        </div>
                    `;
                }
                return false;
            };

            // 從 URL 取得參數
            const params = new URLSearchParams(window.location.search);
            const blockId = params.get('block');
            const lang = params.get('lang') || 'zh-TW';
            const obsMode = params.get('obs') === '1' || params.get('obs') === 'true';
            const obsCompact = params.get('compact') === '1' || params.get('compact') === 'true';

            // 區塊設定 (提升至全域作用域以供 HTML onchange 使用)
            window.blockConfig = {
                'form-card': {
                    title: 'header_add_record',
                    icon: '➕',
                    render: renderFormCard
                },
                'table-card-main': {
                    title: 'header_record_table',
                    icon: '📋',
                    render: renderTableCard
                },
                'search-card': {
                    title: 'header_search_filters',
                    icon: '🔎',
                    render: renderSearchCard
                },
                'score-chart-card': {
                    title: 'header_score_trend',
                    currentMode: 'games',
                    currentType: 'score',
                    currentStartIndex: 1,
                    render: renderScoreChart
                },
                'deck-chart-card': {
                    title: 'header_deck_dist',
                    icon: '🥧',
                    render: renderDeckChart
                },
                'stats-grid-wrapper': {
                    title: 'header_stats',
                    icon: '📊',
                    render: renderStatsGrid
                },
                'search-results-card': {
                    title: 'header_search_results',
                    icon: '📋',
                    render: renderSearchResults
                },
                'set-comparison-card': {
                    title: 'header_set_comparison',
                    icon: '📊',
                    render: renderSetComparisonCard
                },
                'matchup-overview-card': {
                    title: 'header_matchup_overview',
                    icon: '⚔️',
                    render: renderMatchupOverviewCard
                }
            };

            /**
             * 應用表格行距設定
             */
            function applyRowHeight() {
                const columnSettings = DataManager.getColumnSettings() || {};
                const rowHeight = columnSettings.rowHeight || 'slim';

                // 移除所有行距類別
                document.body.classList.remove('row-height-slim', 'row-height-normal', 'row-height-spacious');

                // 套用新的行距類別
                switch (rowHeight) {
                    case 'slim':
                        document.body.classList.add('row-height-slim');
                        document.documentElement.style.setProperty('--table-padding-y', '0.35rem');
                        break;
                    case 'normal':
                        document.body.classList.add('row-height-normal');
                        document.documentElement.style.setProperty('--table-padding-y', '0.75rem');
                        break;
                    case 'spacious':
                        document.body.classList.add('row-height-spacious');
                        document.documentElement.style.setProperty('--table-padding-y', '1.25rem');
                        break;
                }
            }

            /**
             * 初始化
             */
            function init() {
                // 設定 OBS 模式
                if (obsMode) {
                    document.body.classList.add('obs-mode');
                }
                if (obsCompact) {
                    document.body.classList.add('obs-compact');
                }

                // 設定語言
                if (lang) {
                    localStorage.setItem('cardBattleLanguage', lang);
                }
                i18n.init();

                // 如果 URL 指定顯示模式，設定 localStorage (優先於現有設定)
                if (params.has('simple') && blockId === 'stats-grid-wrapper') {
                    const isSimple = params.get('simple') === '1' || params.get('simple') === 'true';
                    localStorage.setItem('statsDisplayMode', isSimple ? 'simple' : 'standard');
                }

                // 應用行距設定
                applyRowHeight();

                // 初始化同步
                SyncManager.init();
                subscribeToSync();

                // 渲染區塊
                renderBlock();

                // 更新頁面標題
                updateTitle();

                // 綁定欄位設定 Modal 事件
                bindColumnSettingsEvents();
            }

            /**
             * 綁定欄位設定 Modal 事件
             */
            function bindColumnSettingsEvents() {
                const closeBtn = document.getElementById('close-column-modal-btn');
                if (closeBtn) {
                    closeBtn.addEventListener('click', () => {
                        const modal = document.getElementById('column-settings-modal');
                        if (modal) modal.classList.remove('active');
                    });
                }

                const confirmBtn = document.getElementById('confirm-columns-btn');
                if (confirmBtn) {
                    confirmBtn.addEventListener('click', () => {
                        if (typeof TableManager !== 'undefined' && TableManager.saveColumnSettings) {
                            TableManager.saveColumnSettings();
                        }
                    });
                }

                const resetBtn = document.getElementById('reset-columns-btn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => {
                        if (typeof TableManager !== 'undefined' && TableManager.resetColumnSettings) {
                            TableManager.resetColumnSettings();
                        }
                    });
                }

                // 行距設定按鈕
                const rowHeightBtns = document.querySelectorAll('#row-height-options .btn');
                rowHeightBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const height = btn.dataset.height;
                        // 更新 UI 選取狀態
                        rowHeightBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                });

                // 點擊 Modal 外部關閉
                window.addEventListener('click', (e) => {
                    const modal = document.getElementById('column-settings-modal');
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            }

            /**
             * 更新頁面標題
             */
            function updateTitle() {
                const config = window.blockConfig[blockId];
                if (config && config.title) {
                    document.getElementById('popout-title').textContent = i18n.get(config.title) || '趨勢分析';
                    document.title = `🎴 ${i18n.get(config.title) || '趨勢分析'}`;
                } else {
                    document.getElementById('popout-title').textContent = '趨勢分析';
                    document.title = '🎴 趨勢分析';
                }

                // 更新簡易顯示按鈕顯示狀態
                updateSimpleStatsButton(blockId);
            }

            /**
             * 訂閱同步事件
             */
            function subscribeToSync() {
                SyncManager.subscribe((message) => {
                    const indicator = document.getElementById('sync-indicator');
                    indicator.classList.add('syncing');

                    switch (message.type) {
                        case SyncManager.EventTypes.RECORD_ADDED:
                        case SyncManager.EventTypes.RECORD_UPDATED:
                        case SyncManager.EventTypes.RECORD_DELETED:
                        case SyncManager.EventTypes.RECORDS_IMPORTED:
                        case SyncManager.EventTypes.FULL_SYNC:
                            renderBlock(message.data?.records);
                            break;

                        case SyncManager.EventTypes.SEARCH_FILTERS_CHANGED:
                            // 主頁面搜尋條件變更 - 根據彈出視窗類型更新
                            handleSearchFiltersChanged(message.data);
                            break;

                        case SyncManager.EventTypes.SETTINGS_CHANGED:
                            // 應用設定 (包含行距、備註顯示、批次模式、欄位設定)
                            applyRowHeight();

                            // 對於搜尋結果視窗，只重新渲染表格內容而非整個區塊
                            if (blockId === 'search-results-card') {
                                // 同步渣操備註顯示狀態
                                if (message.data && message.data.isMisplayNotesVisible !== undefined) {
                                    isPopoutMisplayNotesVisible = message.data.isMisplayNotesVisible;
                                    const btn = document.getElementById('search-toggle-misplay-notes-btn');
                                    if (btn) {
                                        btn.textContent = isPopoutMisplayNotesVisible ?
                                            (i18n.get('btn_hide_misplay_notes') || '隱藏渣操備註') :
                                            (i18n.get('btn_show_misplay_notes') || '顯示渣操備註');
                                    }
                                }

                                // 重新渲染表格（使用 localStorage 中的過濾結果）
                                let searchResults = [];
                                try {
                                    const stored = localStorage.getItem('cardBattleSearchResults');
                                    if (stored) {
                                        searchResults = JSON.parse(stored);
                                    }
                                } catch (e) {
                                    console.error('Failed to load search results:', e);
                                }
                                renderSearchResultsTable(searchResults);
                            } else {
                                renderBlock();
                            }
                            break;


                        case SyncManager.EventTypes.LANGUAGE_CHANGED:
                            i18n.setLang(message.data.lang);
                            updateTitle();
                            renderBlock();
                            break;
                    }


                    setTimeout(() => {
                        indicator.classList.remove('syncing');
                    }, 500);
                });

                // 請求初始同步
                SyncManager.requestFullSync();
            }

            /**
             * 處理搜尋條件變更事件
             */
            function handleSearchFiltersChanged(data = {}) {
                const startIndex = data.startIndex || (window.DataManager ? window.DataManager.getChartStartIndex() : 1);
                // 保存到持久化儲存
                if (window.DataManager && window.DataManager.saveChartStartIndex) {
                    window.DataManager.saveChartStartIndex(startIndex);
                }
                // 保存到配置中，以便手動切換圖表模式時使用
                if (!window.blockConfig['score-chart-card']) window.blockConfig['score-chart-card'] = {};
                window.blockConfig['score-chart-card'].currentStartIndex = startIndex;
                
                // 如果是搜尋結果視窗，執行搜尋過濾
                if (blockId === 'search-results-card') {
                    renderSearchResults();
                } else {
                    // 其他依賴搜尋結果的視窗 (統計、圖表)
                    let searchResults = [];
                    try {
                        const stored = localStorage.getItem('cardBattleSearchResults');
                        if (stored) {
                            searchResults = JSON.parse(stored);
                        }
                    } catch (e) {

            /**
             * 渲染：趨勢分析圖
             */
            let popoutScoreChart = null;
            const SEGMENT_SIZE = 50;

            function renderScoreChart(providedRecords = null, mode = 'games', type = 'score', startIndex = 1) {
                const blockInfo = window.blockConfig['score-chart-card'];
                if (blockInfo) {
                    blockInfo.currentMode = mode;
                    blockInfo.currentType = type;
                    blockInfo.currentStartIndex = startIndex;
                }
                document.getElementById('popout-content').innerHTML = `
                    <div class="card chart-card" style="display: flex; flex-direction: column;">
                        <div class="card-header" style="padding: 0.5rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                            <span style="font-size: 0.9em; font-weight: 500;" id="popout-chart-title">${type === 'winrate' ? (i18n.get('header_winrate_trend') || '勝率變化趨勢') : (i18n.get('header_score_trend') || '分數變化趨勢')}</span>
                            <div style="flex: 1;"></div>
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                <select id="popout-score-chart-type-selector" class="form-control" style="width: auto; padding: 0.2rem 0.5rem; font-size: 0.9em; cursor: pointer;" onchange="renderScoreChart(null, document.getElementById('popout-score-chart-axis-mode').value, this.value, window.blockConfig['score-chart-card']?.currentStartIndex || 1); SyncManager.broadcast(SyncManager.EventTypes.SCORE_CHART_TYPE_CHANGED, { type: this.value });">
                                    <option value="score" ${type === 'score' ? 'selected' : ''} data-i18n="opt_trend_score">${i18n.get('opt_trend_score') || '分數趨勢'}</option>
                                    <option value="winrate" ${type === 'winrate' ? 'selected' : ''} data-i18n="opt_trend_winrate">${i18n.get('opt_trend_winrate') || '勝率趨勢'}</option>
                                </select>
                                <select id="popout-score-chart-axis-mode" class="form-control" style="width: auto; padding: 0.2rem 0.5rem; font-size: 0.9em; cursor: pointer;" onchange="renderScoreChart(null, this.value, document.getElementById('popout-score-chart-type-selector').value, window.blockConfig['score-chart-card']?.currentStartIndex || 1); SyncManager.broadcast(SyncManager.EventTypes.SCORE_CHART_MODE_CHANGED, { mode: this.value });">
                                    <option value="games" ${mode === 'games' ? 'selected' : ''} data-i18n="opt_axis_games">${i18n.get('opt_axis_games') || '依場次'}</option>
                                    <option value="dates" ${mode === 'dates' ? 'selected' : ''} data-i18n="opt_axis_dates">${i18n.get('opt_axis_dates') || '依日期'}</option>
                                 </select>
                                 <span id="popout-winrate-info-icon" class="info-icon" style="cursor: help; color: hsla(0, 0%, 100%, 0.6); font-size: 0.9em; margin-left: 4px; display: ${type === 'winrate' ? 'inline-flex' : 'none'}; align-items: center;" 
                                     data-i18n-tooltip="chart_info_tooltip"
                                     data-tooltip="[依場次]: 每一個點代表「包含當前的前 20 場」滾動平均勝率&#10;[依日期]: 每一個點代表「該整天所有比賽」的總勝率">ℹ️</span>
                             </div>
                        </div>
                        <div class="chart-container" style="flex: 1; min-height: 600px;">
                            <canvas id="popout-score-chart"></canvas>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    // 保存 startIndex 到 window.blockConfig 以便切換模式時維持同步
                    if (!window.blockConfig['score-chart-card']) window.blockConfig['score-chart-card'] = {};
                    window.blockConfig['score-chart-card'].currentStartIndex = startIndex;

                    let records = providedRecords;
                    if (!records) {
                        try {
                            const stored = localStorage.getItem('cardBattleSearchResults');
                            if (stored) records = JSON.parse(stored);
                        } catch (e) { console.error('Failed to load search results:', e); }
                        if (!records || records.length === 0) records = DataManager.getRecords();
                    }

                    let targetRecords = [];
                    if (type === 'score') {
                        targetRecords = records.filter(r => r.score !== '' && r.score !== null && r.score !== undefined);
                    } else {
                        targetRecords = records.filter(r => r.result === '勝利' || r.result === '敗北' || r.result === '平手');
                    }

                    const baseSortedRecords = [...targetRecords].sort((a, b) => {
                        const dateA = a.date ? new Date(a.date.replace(/\//g, '-')) : new Date(a.createdAt);
                        const dateB = b.date ? new Date(b.date.replace(/\//g, '-')) : new Date(b.createdAt);
                        if (dateA.getTime() !== dateB.getTime()) return dateA - dateB;
                        return a.id.localeCompare(b.id);
                    });

                    let sortedRecords;
                    if (mode === 'dates') {
                        const uniqueDatesMap = new Map();
                        baseSortedRecords.forEach(r => {
                            const fullDate = r.date || 'Unknown';
                            const d = fullDate.substring(0, 10);
                            uniqueDatesMap.set(d, r);
                        });
                        sortedRecords = Array.from(uniqueDatesMap.values());
                    } else {
                        sortedRecords = baseSortedRecords;
                    }

                    const labels = sortedRecords.map((r, i) => {
                        return mode === 'dates' ? (r.date || 'Unknown') : `#${startIndex + i}`;
                    });

                    let dataPoints = [];
                    if (type === 'score') {
                        dataPoints = sortedRecords.map(r => parseFloat(r.score) || 0);
                    } else {
                        const calcSettings = DataManager.getCalcSettings();
                        const excludeDraws = calcSettings.excludeDraws;
                        const ratesMap = new Map();

                        if (mode === 'dates') {
                            // --- 每日總勝率模式 ---
                            const dateStatsMap = new Map();
                            baseSortedRecords.forEach(r => {
                                const d = (r.date || 'Unknown').substring(0, 10);
                                if (!dateStatsMap.has(d)) dateStatsMap.set(d, { wins: 0, total: 0 });
                                const stats = dateStatsMap.get(d);
                                if (r.result === '勝利') { stats.wins++; stats.total++; }
                                else if (r.result === '敗北') { stats.total++; }
                                else if (r.result === '平手' && !excludeDraws) { stats.total++; }
                            });
                            dateStatsMap.forEach((stats, d) => {
                                const rate = stats.total > 0 ? ((stats.wins / stats.total) * 100).toFixed(1) : 0;
                                const representative = sortedRecords.find(r => (r.date || 'Unknown').startsWith(d));
                                if (representative) ratesMap.set(representative.id, parseFloat(rate));
                            });
                        } else {
                            // --- 20 場滾動勝率模式 ---
                            const WINDOW_SIZE = 20;
                            for (let i = 0; i < baseSortedRecords.length; i++) {
                                const startIdx = Math.max(0, i - (WINDOW_SIZE - 1));
                                const windowRecords = baseSortedRecords.slice(startIdx, i + 1);
                                let winCount = 0;
                                let validCount = 0;
                                windowRecords.forEach(r => {
                                    if (r.result === '勝利') { winCount++; validCount++; }
                                    else if (r.result === '敗北') { validCount++; }
                                    else if (r.result === '平手' && !excludeDraws) { validCount++; }
                                });
                                const rate = validCount > 0 ? ((winCount / validCount) * 100).toFixed(1) : 0;
                                ratesMap.set(baseSortedRecords[i].id, parseFloat(rate));
                            }
                        }
                        dataPoints = sortedRecords.map(r => ratesMap.get(r.id) || 0);
                    }

                    const pointColors = sortedRecords.map(r => {
                        if (r.result === '勝利') return 'hsla(145, 70%, 50%, 1)';
                        if (r.result === '敗北') return 'hsla(0, 70%, 55%, 1)';
                        return 'hsla(0, 0%, 50%, 1)';
                    });

                    const ctx = document.getElementById('popout-score-chart');
                    if (!ctx || sortedRecords.length === 0) return;

                    if (popoutScoreChart) popoutScoreChart.destroy();
                    popoutScoreChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: type === 'winrate' ? (i18n.get('chart_winrate') || '勝率') : (i18n.get('chart_score') || '分數'),
                                data: dataPoints,
                                borderColor: 'hsl(250, 80%, 60%)',
                                backgroundColor: 'hsla(250, 80%, 60%, 0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 4,
                                pointHoverRadius: 6,
                                pointBackgroundColor: pointColors,
                                pointBorderColor: '#fff',
                                pointBorderWidth: 2,
                                clip: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        title: function(context) {
                                            const index = context[0].dataIndex;
                                            const record = sortedRecords[index];
                                            const dateStr = record && record.date ? record.date : '';
                                            const label = context[0].label;
                                            return mode === 'dates' ? `${i18n.get('chart_date')}: ${dateStr}` : (dateStr ? `${i18n.get('chart_date')}: ${dateStr} (${label})` : label);
                                        },
                                        label: function(context) {
                                            if (type === 'winrate') {
                                                // 從原始 dataPoints 陣列中獲取正確的數值
                                                const realValue = dataPoints[context.dataIndex];
                                                return `${i18n.get('chart_winrate') || '勝率'}: ${realValue}%`;
                                            }
                                            const record = sortedRecords[context.dataIndex];
                                            if (record) {
                                                return [
                                                    `${i18n.get('chart_score')}: ${context.raw}`,
                                                    `${i18n.get('chart_opponent')}: ${record.opponentDeck || ''}`,
                                                    `${i18n.get('chart_result')}: ${record.result || ''}`
                                                ];
                                            }
                                            return `${i18n.get('chart_score')}: ${context.raw}`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: {
                                        color: function(context) {
                                            const index = context.index;
                                            const vSegments = (function() {
                                                const segments = [];
                                                if (mode === 'games') {
                                                    for (let i = 0; i < labels.length; i++) {
                                                        const gameNum = startIndex + i;
                                                        if (gameNum % SEGMENT_SIZE === 0) segments.push(i);
                                                    }
                                                }
                                                return segments;
                                            })();
                                            if (vSegments.includes(index)) return 'hsla(0, 0%, 100%, 0.4)';
                                            return 'transparent';
                                        },
                                        lineWidth: 2,
                                        borderDash: [6, 4],
                                        drawOnChartArea: true,
                                        drawTicks: true
                                    },
                                    ticks: {
                                        color: 'hsla(0, 0%, 100%, 0.6)',
                                        maxRotation: 45,
                                        minRotation: 45,
                                        autoSkip: false,
                                        callback: function(val, index) {
                                            const label = this.getLabelForValue(val);
                                            if (mode === 'dates') return label;
                                            // 始終顯示第一個標籤，以及 50 的倍數編號
                                            const num = parseInt(label.replace('#', '')) || 0;
                                            if (index === 0 || num % SEGMENT_SIZE === 0) return label;
                                            return '';
                                        }
                                    }
                                },
                                y: {
                                    min: (function() {
                                        if (type !== 'winrate' || dataPoints.length === 0) return undefined;
                                        return Math.max(0, Math.floor(Math.min(...dataPoints) - 5));
                                    })(),
                                    max: (function() {
                                        if (type !== 'winrate' || dataPoints.length === 0) return undefined;
                                        return Math.min(100, Math.ceil(Math.max(...dataPoints) + 5));
                                    })()
                                }
                            }
                        }
                    });

                    // 針對勝率趨勢，確保數據點完整顯示
                    if (popoutScoreChart) {
                        popoutScoreChart.data.datasets[0].data = dataPoints;
                        popoutScoreChart.update();
                    }
                }, 100);
            }

            /**
             * 渲染:牌組分布圖
             */
            function renderDeckChart(providedRecords = null) {
                // 顏色調色盤
                const colorPalette = [
                    'hsl(280, 70%, 60%)',   // 紫色
                    'hsl(145, 70%, 50%)',   // 綠色
                    'hsl(45, 100%, 55%)',   // 黃色
                    'hsl(0, 70%, 55%)',     // 紅色
                    'hsl(200, 80%, 55%)',   // 藍色
                    'hsl(320, 70%, 60%)',   // 粉紅
                    'hsl(30, 90%, 55%)',    // 橙色
                    'hsl(170, 70%, 50%)',   // 青綠
                    'hsl(260, 60%, 65%)',   // 淡紫
                    'hsl(60, 80%, 50%)'     // 黃綠
                ];

                document.getElementById('popout-content').innerHTML = `
                    <div class="card chart-card" style="height: auto;">
                        <div style="padding: 1.2rem;">
                            <div style="height: 500px;">
                                <canvas id="popout-deck-chart"></canvas>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    if (typeof Chart === 'undefined') {
                        document.getElementById('popout-content').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted);">圖表庫載入失敗，請確認網路連線後重試。</div>';
                        return;
                    }
                    let records = providedRecords;
                    if (!records) {
                        try {
                            const stored = localStorage.getItem('cardBattleSearchResults');
                            if (stored) {
                                records = JSON.parse(stored);
                            }
                        } catch (e) {
                            console.error('Failed to load search results:', e);
                        }
                        if (!records || records.length === 0) {
                            records = DataManager.getRecords();
                        }
                    }

                    const ctx = document.getElementById('popout-deck-chart');

                    if (!records || records.length === 0) {
                        ctx.parentElement.innerHTML = '<div style="color: var(--text-muted); padding: 1rem; text-align: center;">沒有資料可顯示</div>';
                        return;
                    }

                    // 統計對手牌組分布
                    const deckCounts = {};
                    records.forEach(r => {
                        if (r.opponentDeck) {
                            deckCounts[r.opponentDeck] = (deckCounts[r.opponentDeck] || 0) + 1;
                        }
                    });

                    // 排序
                    const sortedDecks = Object.entries(deckCounts).sort((a, b) => b[1] - a[1]);

                    if (sortedDecks.length === 0) {
                        ctx.parentElement.innerHTML = '<div style="color: var(--text-muted); padding: 1rem; text-align: center;">沒有對手牌組資料</div>';
                        return;
                    }

                    const totalGames = records.length;

                    // 如果超過10種牌組,將後面的合併為「其他」
                    let displayDecks = [];
                    let othersData = [];

                    if (sortedDecks.length > 10) {
                        const top9 = sortedDecks.slice(0, 9);
                        const others = sortedDecks.slice(9);
                        const othersSum = others.reduce((sum, [_, count]) => sum + count, 0);
                        othersData = others;

                        displayDecks = [...top9, [i18n.get('opt_others') || '其他', othersSum]];
                    } else {
                        displayDecks = sortedDecks;
                    }

                    const labels = displayDecks.map(([deck]) => deck);
                    const data = displayDecks.map(([_, count]) => count);
                    const colors = displayDecks.map((_, i) => colorPalette[i % colorPalette.length]);

                    // 創建圖表 (啟用預設圖例)
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels,
                            datasets: [{
                                data,
                                backgroundColor: colors,
                                borderColor: '#ffffff',
                                borderWidth: 2,
                                hoverOffset: 10
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'top',
                                    labels: {
                                        color: 'hsla(0, 0%, 100%, 0.9)',
                                        padding: 15,
                                        usePointStyle: true,
                                        pointStyle: 'rect',
                                        boxWidth: 18,
                                        boxHeight: 14,
                                        font: {
                                            size: 14
                                        }
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'hsla(230, 25%, 15%, 0.95)',
                                    titleColor: '#fff',
                                    bodyColor: '#fff',
                                    borderColor: 'hsla(250, 80%, 60%, 0.5)',
                                    borderWidth: 1,
                                    padding: 12,
                                    callbacks: {
                                        label: function (context) {
                                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                            const percentage = ((context.raw / total) * 100).toFixed(1);
                                            return `${context.label}: ${context.raw} 場 (${percentage}%)`;
                                        },
                                        afterBody: function (context) {
                                            // 如果是「其他」類別,顯示詳細資訊
                                            const othersLabel = i18n.get('opt_others') || '其他';
                                            if (context[0] && context[0].label === othersLabel && othersData.length > 0) {
                                                const lines = ['', '包含:'];
                                                othersData.forEach(([deck, count]) => {
                                                    const pct = ((count / totalGames) * 100).toFixed(1);
                                                    lines.push(`  ${deck}: ${count}場 (${pct}%)`);
                                                });
                                                return lines;
                                            }
                                            return [];
                                        }
                                    }
                                }
                            },
                            cutout: '50%'
                        }
                    });
                }, 200);
            }
