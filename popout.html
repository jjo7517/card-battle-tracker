            /**
             * Popout SET comparison render logic (self-contained)
             */
            function popoutRenderSetComparison(container, results, setSize) {
                if (!container) return;
                if (results.length < setSize * 2) {
                    container.innerHTML = `<div style="padding:1.5rem; text-align:center; color:var(--text-muted);">${i18n.get('label_not_enough_data') || '資料不足'} (${results.length}/${setSize * 2})</div>`;
                    return;
                }

                const currentSet = results.slice(0, setSize);
                const previousSet = results.slice(setSize, setSize * 2);

                function calcStats(set) {
                    const total = set.length;
                    const wins = set.filter(r => r.result === '勝利').length;
                    const firstCount = set.filter(r => isFirst(r.turnOrder)).length;
                    const secondCount = set.filter(r => isSecond(r.turnOrder)).length;
                    const firstWins = set.filter(r => isFirst(r.turnOrder) && r.result === '勝利').length;
                    const secondWins = set.filter(r => isSecond(r.turnOrder) && r.result === '勝利').length;
                    const turnTotal = firstCount + secondCount;
                    return {
                        winRate: total > 0 ? (wins / total * 100) : 0,
                        firstRate: turnTotal > 0 ? (firstCount / turnTotal * 100) : 0,
                        firstWinRate: firstCount > 0 ? (firstWins / firstCount * 100) : 0,
                        secondWinRate: secondCount > 0 ? (secondWins / secondCount * 100) : 0
                    };
                }

                const curr = calcStats(currentSet);
                const prev = calcStats(previousSet);

                function diffHtml(currVal, prevVal) {
                    const diff = currVal - prevVal;
                    const cls = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';
                    const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '—';
                    return `<span class="set-diff ${cls}">${arrow} ${Math.abs(diff).toFixed(1)}%</span>`;
                }

                function escapeHtml(unsafe) {
                    if (!unsafe) return '';
                    return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
                }

                // 對不同牌組的勝率變化
                function calcDeckWinRates(set) {
                    const stats = {};
                    set.forEach(r => {
                        const d = r.opponentDeck || '(unknown)';
                        if (!stats[d]) stats[d] = { games: 0, wins: 0 };
                        stats[d].games++;
                        if (r.result === '勝利') stats[d].wins++;
                    });
                    return stats;
                }

                const currDeckWR = calcDeckWinRates(currentSet);
                const prevDeckWR = calcDeckWinRates(previousSet);
                const allWRDecks = new Set([...Object.keys(currDeckWR), ...Object.keys(prevDeckWR)]);

                let deckWinRateHtml = '';
                const sortedWRDecks = [...allWRDecks].sort((a, b) => (currDeckWR[b]?.games || 0) - (currDeckWR[a]?.games || 0));
                sortedWRDecks.forEach(deck => {
                    const c = currDeckWR[deck] || { games: 0, wins: 0 };
                    const p = prevDeckWR[deck] || { games: 0, wins: 0 };
                    const cWR = c.games > 0 ? (c.wins / c.games * 100) : null;
                    const pWR = p.games > 0 ? (p.wins / p.games * 100) : null;
                    let diffCell = '<span class="set-diff neutral">—</span>';
                    if (cWR !== null && pWR !== null) {
                        diffCell = diffHtml(cWR, pWR);
                    }
                    deckWinRateHtml += `<tr>
                        <td>${escapeHtml(deck)}</td>
                        <td>${p.games > 0 ? p.wins + '/' + p.games : '-'}</td>
                        <td>${p.games > 0 ? pWR.toFixed(1) + '%' : '-'}</td>
                        <td>${c.games > 0 ? c.wins + '/' + c.games : '-'}</td>
                        <td>${c.games > 0 ? cWR.toFixed(1) + '%' : '-'}</td>
                        <td>${diffCell}</td>
                    </tr>`;
                });

                // 牌組分布（前10 + 其他）
                function getDeckDist(set) {
                    const dist = {};
                    set.forEach(r => {
                        if (r.opponentDeck) dist[r.opponentDeck] = (dist[r.opponentDeck] || 0) + 1;
                    });
                    return dist;
                }

                function topNPlusOthers(dist, n) {
                    const sorted = Object.entries(dist).sort((a, b) => b[1] - a[1]);
                    const topN = sorted.slice(0, n);
                    const othersCount = sorted.slice(n).reduce((sum, [, c]) => sum + c, 0);
                    const result = topN.map(([name, count]) => ({ name, count }));
                    if (othersCount > 0) {
                        result.push({ name: i18n.get('label_others') || '其他', count: othersCount });
                    }
                    return result;
                }

                const currDist = getDeckDist(currentSet);
                const prevDist = getDeckDist(previousSet);
                const currTop = topNPlusOthers(currDist, 10);
                const prevTop = topNPlusOthers(prevDist, 10);

                const distNames = new Set([...currTop.map(d => d.name), ...prevTop.map(d => d.name)]);
                const currDistMap = Object.fromEntries(currTop.map(d => [d.name, d.count]));
                const prevDistMap = Object.fromEntries(prevTop.map(d => [d.name, d.count]));

                let deckChangeHtml = '';
                const sortedDistNames = [...distNames].sort((a, b) => (currDistMap[b] || 0) - (currDistMap[a] || 0));
                sortedDistNames.forEach(deck => {
                    const c = currDistMap[deck] || 0;
                    const p = prevDistMap[deck] || 0;
                    const cPct = (c / setSize * 100).toFixed(1);
                    const pPct = (p / setSize * 100).toFixed(1);
                    const diff = c - p;
                    let tag = '';
                    const othersLabel = i18n.get('label_others') || '其他';
                    if (p === 0 && c > 0 && deck !== othersLabel) tag = `<span class="set-tag new">${i18n.get('label_new_deck')}</span>`;
                    else if (c === 0 && p > 0 && deck !== othersLabel) tag = `<span class="set-tag gone">${i18n.get('label_gone_deck')}</span>`;
                    const cls = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';
                    deckChangeHtml += `<tr>
                        <td>${escapeHtml(deck)} ${tag}</td>
                        <td>${p} (${pPct}%)</td>
                        <td>${c} (${cPct}%)</td>
                        <td><span class="set-diff ${cls}">${diff > 0 ? '+' : ''}${diff}</span></td>
                    </tr>`;
                });

                container.innerHTML = `
                    <div class="set-comparison-grid">
                        <table class="set-stats-table">
                            <thead><tr>
                                <th></th>
                                <th>${i18n.get('label_previous_set') || '前一組'} (${setSize})</th>
                                <th>${i18n.get('label_current_set') || '最新一組'} (${setSize})</th>
                                <th>${i18n.get('label_difference') || '差異'}</th>
                            </tr></thead>
                            <tbody>
                                <tr><td>${i18n.get('stat_win_rate')}</td><td>${prev.winRate.toFixed(1)}%</td><td>${curr.winRate.toFixed(1)}%</td><td>${diffHtml(curr.winRate, prev.winRate)}</td></tr>
                                <tr><td>${i18n.get('stat_first_rate')}</td><td>${prev.firstRate.toFixed(1)}%</td><td>${curr.firstRate.toFixed(1)}%</td><td>${diffHtml(curr.firstRate, prev.firstRate)}</td></tr>
                                <tr><td>${i18n.get('stat_first_win_rate')}</td><td>${prev.firstWinRate.toFixed(1)}%</td><td>${curr.firstWinRate.toFixed(1)}%</td><td>${diffHtml(curr.firstWinRate, prev.firstWinRate)}</td></tr>
                                <tr><td>${i18n.get('stat_second_win_rate')}</td><td>${prev.secondWinRate.toFixed(1)}%</td><td>${curr.secondWinRate.toFixed(1)}%</td><td>${diffHtml(curr.secondWinRate, prev.secondWinRate)}</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <h4 class="set-section-toggle" id="toggle-deck-wr-section" style="margin:1rem 0 0.5rem; padding:0 1rem; cursor:pointer; user-select:none;">
                        <span class="set-section-arrow">▶</span> ${i18n.get('label_deck_winrate_change') || '對不同牌組勝率變化'}
                    </h4>
                    <div id="deck-wr-section" class="set-collapsible-section" style="display:none; padding:0 1rem 1rem;">
                        <div class="table-container">
                            <table class="set-deck-table">
                                <thead>
                                    <tr>
                                        <th rowspan="2">${i18n.get('th_matchup_deck') || '牌組'}</th>
                                        <th colspan="2" style="text-align:center;">${i18n.get('label_previous_set') || '上一組 SET'}</th>
                                        <th colspan="2" style="text-align:center;">${i18n.get('label_current_set') || '最新 SET'}</th>
                                        <th rowspan="2">${i18n.get('label_difference') || '差異'}</th>
                                    </tr>
                                    <tr>
                                        <th style="font-weight:normal; font-size:0.85em; opacity:0.8; text-align:center;">(${i18n.get('label_wins_total') || '勝場/總場次'})</th>
                                        <th style="font-weight:normal; font-size:0.85em; opacity:0.8; text-align:center;">${i18n.get('stat_win_rate') || '勝率'}</th>
                                        <th style="font-weight:normal; font-size:0.85em; opacity:0.8; text-align:center;">(${i18n.get('label_wins_total') || '勝場/總場次'})</th>
                                        <th style="font-weight:normal; font-size:0.85em; opacity:0.8; text-align:center;">${i18n.get('stat_win_rate') || '勝率'}</th>
                                    </tr>
                                </thead>
                                <tbody>${deckWinRateHtml}</tbody>
                            </table>
                        </div>
                    </div>
                    <h4 class="set-section-toggle" id="toggle-deck-dist-section" style="margin:1rem 0 0.5rem; padding:0 1rem; cursor:pointer; user-select:none;">
                        <span class="set-section-arrow">▶</span> ${i18n.get('label_deck_distribution_change') || '牌組分布變化'}
                    </h4>
                    <div id="deck-dist-section" class="set-collapsible-section" style="display:none; padding:0 1rem 1rem;">
                        <div class="table-container">
                            <table class="set-deck-table">
                                <thead><tr>
                                    <th>${i18n.get('th_matchup_deck') || '對手牌組'}</th>
                                    <th>${i18n.get('label_previous_set') || '上一組 SET'}</th>
                                    <th>${i18n.get('label_current_set') || '最新 SET'}</th>
                                    <th>${i18n.get('label_difference') || '差異'}</th>
                                </tr></thead>
                                <tbody>${deckChangeHtml}</tbody>
                            </table>
                        </div>
                    </div>
                `;

                // Bind toggle events for collapsible sections
                const toggleWrBtn = container.querySelector('#toggle-deck-wr-section');
                const wrSection = container.querySelector('#deck-wr-section');
                if (toggleWrBtn && wrSection) {
                    toggleWrBtn.addEventListener('click', () => {
                        const isHidden = wrSection.style.display === 'none';
                        wrSection.style.display = isHidden ? '' : 'none';
                        toggleWrBtn.querySelector('.set-section-arrow').textContent = isHidden ? '▼' : '▶';
                    });
                }

                const toggleDistBtn = container.querySelector('#toggle-deck-dist-section');
                const distSection = container.querySelector('#deck-dist-section');
                if (toggleDistBtn && distSection) {
                    toggleDistBtn.addEventListener('click', () => {
                        const isHidden = distSection.style.display === 'none';
                        distSection.style.display = isHidden ? '' : 'none';
                        toggleDistBtn.querySelector('.set-section-arrow').textContent = isHidden ? '▼' : '▶';
                    });
                }
            }

            /**
             * Popout matchup overview render logic (self-contained)
             */
            function popoutRenderMatchupOverview(tbody, results) {
                if (!tbody || results.length === 0) return;
                const deckStats = {};
                let totalWins = 0, totalGames = 0;
                let totalFirstGames = 0, totalFirstWins = 0;
                let totalSecondGames = 0, totalSecondWins = 0;
                results.forEach(r => {
                    const deck = r.opponentDeck || '(unknown)';
                    if (!deckStats[deck]) deckStats[deck] = { games: 0, wins: 0, firstGames: 0, firstWins: 0, secondGames: 0, secondWins: 0 };
                    deckStats[deck].games++; totalGames++;
                    if (r.result === '勝利') { deckStats[deck].wins++; totalWins++; }
                    if (isFirst(r.turnOrder)) { deckStats[deck].firstGames++; totalFirstGames++; if (r.result === '勝利') { deckStats[deck].firstWins++; totalFirstWins++; } }
                    if (isSecond(r.turnOrder)) { deckStats[deck].secondGames++; totalSecondGames++; if (r.result === '勝利') { deckStats[deck].secondWins++; totalSecondWins++; } }
                });
                function pctVal(n, d) { return d > 0 ? (n / d * 100).toFixed(1) + '%' : '-'; }
                function wrClass(n, d) { if (d === 0) return ''; const rate = n / d * 100; if (rate >= 60) return 'wr-high'; if (rate >= 45) return 'wr-mid'; return 'wr-low'; }
                let html = `<tr class="matchup-total-row"><td><strong>${i18n.get('label_all_decks') || '全部牌組'}</strong></td><td><strong>${totalGames}</strong></td><td class="${wrClass(totalWins, totalGames)}"><strong>${pctVal(totalWins, totalGames)}</strong></td><td class="${wrClass(totalFirstWins, totalFirstGames)}"><strong>${pctVal(totalFirstWins, totalFirstGames)}</strong></td><td class="${wrClass(totalSecondWins, totalSecondGames)}"><strong>${pctVal(totalSecondWins, totalSecondGames)}</strong></td></tr>`;
                const sorted = Object.entries(deckStats).sort((a, b) => b[1].games - a[1].games);
                sorted.forEach(([deck, s]) => {
                    html += `<tr><td>${escapeHtml(deck)}</td><td>${s.games}</td><td class="${wrClass(s.wins, s.games)}">${pctVal(s.wins, s.games)}</td><td class="${wrClass(s.firstWins, s.firstGames)}">${pctVal(s.firstWins, s.firstGames)}</td><td class="${wrClass(s.secondWins, s.secondGames)}">${pctVal(s.secondWins, s.secondGames)}</td></tr>`;
                });
                tbody.innerHTML = html;
            }



            /**
             * 渲染：統計摘要
             */
            function renderStatsGrid(providedRecords = null) {
                let records = providedRecords;
                if (!records) {
                    // 優先使用過濾後的搜尋結果
                    try {
                        const stored = localStorage.getItem('cardBattleSearchResults');
                        if (stored) {
                            records = JSON.parse(stored);
                        }
                    } catch (e) {
                        console.error('Failed to load search results:', e);
                    }
                    // 若搜尋結果為空，則使用全部紀錄
                    if (!records || records.length === 0) {
                        records = DataManager.getRecords();
                    }
                }

                // 從 DataManager 載入計算設定
                const calcSettings = DataManager.getCalcSettings();
                const excludeDraws = calcSettings.excludeDraws;
                const calcNoDrawId = 'popout-calc-no-draw';

                const total = records.length;

                // 計算細項
                const wins = records.filter(r => r.result === '勝利').length;
                const draws = records.filter(r => r.result === '平手').length;
                const unrecorded = records.filter(r => !r.result || (r.result !== '勝利' && r.result !== '敗北' && r.result !== '平手')).length;

                const firstMoves = records.filter(r => isFirst(r.turnOrder)).length;
                const firstWins = records.filter(r => isFirst(r.turnOrder) && r.result === '勝利').length;
                const firstDraws = records.filter(r => isFirst(r.turnOrder) && r.result === '平手').length;
                const firstUnrecorded = records.filter(r => isFirst(r.turnOrder) && (!r.result || (r.result !== '勝利' && r.result !== '敗北' && r.result !== '平手'))).length;

                const secondMoves = records.filter(r => isSecond(r.turnOrder)).length;
                const secondWins = records.filter(r => isSecond(r.turnOrder) && r.result === '勝利').length;
                const secondDraws = records.filter(r => isSecond(r.turnOrder) && r.result === '平手').length;
                const secondUnrecorded = records.filter(r => isSecond(r.turnOrder) && (!r.result || (r.result !== '勝利' && r.result !== '敗北' && r.result !== '平手'))).length;

                // 同步主頁面的計算邏輯
                const totalValid = total - unrecorded;
                const totalDenominator = excludeDraws ? (totalValid - draws) : totalValid;
                const firstDenominator = excludeDraws ? (firstMoves - firstDraws - firstUnrecorded) : (firstMoves - firstUnrecorded);
                const secondDenominator = excludeDraws ? (secondMoves - secondDraws - secondUnrecorded) : (secondMoves - secondUnrecorded);

                const turnDenominator = firstMoves + secondMoves;
                const winRate = totalDenominator > 0 ? ((wins / totalDenominator) * 100).toFixed(1) : '0.0';
                const firstRate = turnDenominator > 0 ? ((firstMoves / turnDenominator) * 100).toFixed(1) : '0.0';
                const firstWinRate = firstDenominator > 0 ? ((firstWins / firstDenominator) * 100).toFixed(1) : '0.0';
                const secondWinRate = secondDenominator > 0 ? ((secondWins / secondDenominator) * 100).toFixed(1) : '0.0';

                // 計算附註資訊
                const turnUnrecordedCount = records.filter(r => !r.turnOrder).length;
                const statNotes = [];
                if (draws > 0) statNotes.push(`${i18n.get('label_draw_stat')}<i>${draws}</i>`);
                if (unrecorded > 0) statNotes.push(`${i18n.get('label_unrecorded')}<i>${unrecorded}</i>`);
                if (turnUnrecordedCount > 0) statNotes.push(`${i18n.get('label_turn_unrecorded')}<i>${turnUnrecordedCount}</i>`);

                let noteText = statNotes.length > 0 ? statNotes.join('') : '';
                if (noteText) noteText += '<br>' + i18n.get('label_calc_note_suffix');

                const statNoteHtml = noteText ? `<div class="stat-note">${noteText}</div>` : '';

                // 保存當前簡易模式狀態
                const wasSimpleMode = localStorage.getItem('statsDisplayMode') === 'simple';

                const contentEl = document.getElementById('popout-content');
                contentEl.innerHTML = `
                    <div style="margin-bottom: 1rem; display: flex; justify-content: flex-end;">
                        <label class="checkbox-inline" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">
                            <input type="checkbox" id="${calcNoDrawId}" ${excludeDraws ? 'checked' : ''}>
                            <span data-i18n="label_calc_no_draw">${i18n.get('label_calc_no_draw')}</span>
                        </label>
                    </div>
                    <div class="stats-grid">
                        <div class="card stat-card">
                            <div class="stat-icon">📊</div>
                            <div class="stat-content">
                                <div class="stat-label">${i18n.get('stat_total')}</div>
                                <div class="stat-value-container" style="text-align: right;">
                                    <div class="stat-value">${total}</div>
                                    ${statNoteHtml}
                                </div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-icon">🏆</div>
                            <div class="stat-content">
                                <div class="stat-label">${i18n.get('stat_win_rate')}</div>
                                <div class="stat-value">${winRate}%</div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-icon">🎯</div>
                            <div class="stat-content">
                                <div class="stat-label">${i18n.get('stat_first_rate')}</div>
                                <div class="stat-value">${firstRate}%</div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-icon">⭐</div>
                            <div class="stat-content">
                                <div class="stat-label">${i18n.get('stat_first_win_rate')}</div>
                                <div class="stat-value">${firstWinRate}%</div>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-icon">🌙</div>
                            <div class="stat-content">
                                <div class="stat-label">${i18n.get('stat_second_win_rate')}</div>
                                <div class="stat-value">${secondWinRate}%</div>
                            </div>
                        </div>
                    </div>
                `;

                // 重新綁定事件
                document.getElementById(calcNoDrawId).addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    // 儲存設定並廣播
                    DataManager.saveCalcSettings({ excludeDraws: isChecked });
                    SyncManager.broadcast(SyncManager.EventTypes.SETTINGS_CHANGED, {
                        calcSettings: { excludeDraws: isChecked }
                    });
                    renderStatsGrid(providedRecords);
                });

                // 恢復簡易模式狀態
                if (wasSimpleMode) {
                    setTimeout(() => {
                        setSimpleStatsMode(true);
                    }, 0);
                }
            }

            /**
             * 渲染：搜尋結果
             */
            function renderSearchResults(providedRecords = null) {
                let searchResults = [];

                // 優先使用傳入的原始紀錄進行過濾，否則從 localStorage 讀取已過濾結果
                if (providedRecords && Array.isArray(providedRecords)) {
                    // 從 localStorage 讀取目前的篩選條件
                    let filters = { customFields: {} };
                    try {
                        const storedFilters = localStorage.getItem('cardBattleSearchFilters');
                        if (storedFilters) {
                            filters = JSON.parse(storedFilters);
                        }
                    } catch (e) {
                        console.error('Failed to load filters:', e);
                    }

                    // 執行與 SearchManager 相同的過濾邏輯
                    searchResults = providedRecords.filter(record => {
                        // 日期範圍 (注意格式轉換)
                        if (filters.dateStart && record.date) {
                            const recordDate = new Date(record.date.replace(/\//g, '-'));
                            const startDate = new Date(filters.dateStart);
                            if (recordDate < startDate) return false;
                        }
                        if (filters.dateEnd && record.date) {
                            const recordDate = new Date(record.date.replace(/\//g, '-'));
                            const endDate = new Date(filters.dateEnd);
                            if (recordDate > endDate) return false;
                        }

                        if (filters.myDeck && record.myDeck !== filters.myDeck) return false;
                        if (filters.opponentDeck && record.opponentDeck !== filters.opponentDeck) return false;
                        if (filters.turnOrder && record.turnOrder !== filters.turnOrder) return false;

                        // 勝負處理
                        if (filters.result === '平手' && record.result === '平手') {
                            // 保持通過
                        } else if (filters.result && record.result !== filters.result) {
                            return false;
                        }

                        if (filters.gameName && record.gameName !== filters.gameName) return false;
                        if (filters.scoreStart !== '' && record.score !== undefined && record.score < parseInt(filters.scoreStart)) return false;
                        if (filters.scoreEnd !== '' && record.score !== undefined && record.score > parseInt(filters.scoreEnd)) return false;

                        if (filters.keyword) {
                            const keyword = filters.keyword.toLowerCase();
                            const notes = (record.notes || '').toLowerCase();
                            const misplayNote = (record.misplayNote || '').toLowerCase();
                            if (!notes.includes(keyword) && !misplayNote.includes(keyword)) return false;
                        }

                        // 自訂欄位
                        for (const [fieldId, value] of Object.entries(filters.customFields || {})) {
                            if (value && record[fieldId] !== value) return false;
                        }
                        return true;
                    });

                    // 儲存過濾後的結果供後續使用
                    localStorage.setItem('cardBattleSearchResults', JSON.stringify(searchResults));
                } else {
                    try {
                        const stored = localStorage.getItem('cardBattleSearchResults');
                        if (stored) {
                            searchResults = JSON.parse(stored);
                        }
                    } catch (e) {
                        console.error('Failed to load search results:', e);
                    }
                }

                document.getElementById('popout-content').innerHTML = `
                    <div class="card" id="search-results-card">
                        <div class="card-header" style="padding: var(--spacing-md) var(--spacing-lg); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--spacing-md);">
                            <div style="display: flex; gap: var(--spacing-sm); align-items: center;">
                                <span id="search-result-count" class="badge"></span>
                            </div>
                            <div style="display: flex; gap: var(--spacing-sm); align-items: center;">
                                <button id="search-toggle-misplay-notes-btn" class="btn btn-sm btn-outline" data-i18n="btn_show_misplay_notes">顯示渣操備註</button>
                                <button id="search-column-settings-btn" class="btn btn-sm btn-outline" data-i18n="btn_column_settings">欄位設定</button>
                            </div>
                        </div>

                        <div class="table-container">
                            <table id="search-results-table">
                                <thead>
                                    <tr id="search-table-header-row"></tr>
                                </thead>
                                <tbody id="search-results-tbody"></tbody>
                            </table>
                        </div>

                        <div id="no-search-results" class="no-records hidden">
                            <span class="no-records-icon">🔍</span>
                            <p data-i18n="search_prompt">請設定搜尋條件後點擊搜尋按鈕</p>
                        </div>

                        <div id="search-pagination-controls" class="pagination-controls hidden">
                            <button id="search-page-first" class="btn btn-sm">⏮️</button>
                            <button id="search-page-prev-5" class="btn btn-sm">⏪</button>
                            <button id="search-page-prev" class="btn btn-sm">◀️</button>
                            <span id="search-page-info">1 / 1</span>
                            <button id="search-page-next" class="btn btn-sm">▶️</button>
                            <button id="search-page-next-5" class="btn btn-sm">⏩</button>
                            <button id="search-page-last" class="btn btn-sm">⏭️</button>
                            <div class="page-jump">
                                <input type="number" id="search-page-jump-input" min="1" step="1">
                                <button id="search-page-jump-btn" class="btn btn-sm btn-primary">✔</button>
                            </div>
                        </div>
                    </div>
                `;

                // 直接渲染搜尋結果，不使用 SearchManager（避免重複初始化和無限迴圈）
                renderSearchResultsTable(searchResults);

                // 綁定按鈕事件（彈出視窗專用實作）
                const btnMisplay = document.getElementById('search-toggle-misplay-notes-btn');
                if (btnMisplay) {
                    btnMisplay.addEventListener('click', () => {
                        togglePopoutMisplayNotes();
                    });
                }

                const btnColumn = document.getElementById('search-column-settings-btn');
                if (btnColumn) {
                    btnColumn.addEventListener('click', () => {
                        openPopoutColumnSettings();
                    });
                }
            }

            /**

            function resetPopoutColumnSettings() {

                    visible: {},
                    widths: {},

                // gameName 和 createdAt 預設為隱藏

            /**
             * 儲存欄位設定並重新渲染
             */
            function savePopoutColumnSettings() {
                const checkboxes = document.querySelectorAll('#column-checkbox-list input[type="checkbox"]');

                // 取得搜尋專用欄位設定
                const currentSettings = DataManager.getSearchColumnSettings ?
                    DataManager.getSearchColumnSettings() :
                    (DataManager.getColumnSettings() || { visible: {}, widths: {} });

                if (!currentSettings.visible) currentSettings.visible = {};

                // 更新 visible 設定
                checkboxes.forEach(cb => {
                    currentSettings.visible[cb.value] = cb.checked;
                });

                // 儲存搜尋專用設定
                if (DataManager.saveSearchColumnSettings) {
                    DataManager.saveSearchColumnSettings(currentSettings);
                } else {
                    DataManager.saveColumnSettings(currentSettings);
                }

                    SyncManager.broadcast(SyncManager.EventTypes.SETTINGS_CHANGED, {
                        searchColumnSettings: currentSettings
                    });

            let popoutSortField = 'date';

            function renderSearchResultsTable(results) {

                const columnSettings = DataManager.getSearchColumnSettings ?

                const allColumns = [

                    { id: 'gameName', label: i18n.get('th_game_name') || '遊戲' },
                    { id: 'notes', label: i18n.get('th_notes') || '備註' },
                    { id: 'createdAt', label: i18n.get('th_created_at') || '建立時間' }
                ];

                // 過濾隱藏的欄位（gameName 和 createdAt 需明確設為 true）
                const visibleColumns = allColumns.filter(col => {
                    if (col.id === 'gameName' || col.id === 'createdAt') {
                        return columnSettings.visible[col.id] === true;
                    } else {
                        return columnSettings.visible[col.id] !== false;
                    }
                });

                // 渲染表頭（含排序和調整寬度功能）
                headerRow.innerHTML = visibleColumns.map(col => {
                    const width = columnWidths[col.id] ? ` style="width: ${columnWidths[col.id]}"` : '';
                    const activeClass = popoutSortField === col.id ? 'active' : '';
                    const indicator = popoutSortField === col.id ? (popoutSortDirection === 'asc' ? '▲' : '▼') : '↕';

                    return `<th data-col="${col.id}"${width} class="sortable">
                        <span>${col.label}</span>
                        <span class="sort-indicator ${activeClass}">${indicator}</span>
                        <div class="resizer"></div>
                    </th>`;
                }).join('');

                // 綁定排序事件（使用事件委託）
                headerRow.querySelectorAll('th.sortable').forEach(th => {
                    th.addEventListener('click', (e) => {
                        // 避免點擊 resizer 時觸發排序
                        if (e.target.classList.contains('resizer')) return;
                        const field = th.dataset.col;
                        handlePopoutHeaderClick(field);
                    });
                });

                // 綁定調整寬度事件
                headerRow.querySelectorAll('.resizer').forEach(resizer => {
                    resizer.addEventListener('mousedown', (e) => {
                        e.stopPropagation();
                        const th = resizer.parentElement;
                        const field = th.dataset.col;
                        initPopoutResize(e, field);
                    });
                });

                // 排序結果
                const sortedResults = [...results].sort((a, b) => {
                    let aVal = a[popoutSortField];
                    let bVal = b[popoutSortField];

                    // 處理日期
                    if (popoutSortField === 'date') {
                        aVal = a.date ? new Date(a.date.replace(/\//g, '-')) : new Date(0);
                        bVal = b.date ? new Date(b.date.replace(/\//g, '-')) : new Date(0);
                    }

                    // 處理數字
                    if (popoutSortField === 'score') {
                        aVal = parseFloat(aVal) || 0;
                        bVal = parseFloat(bVal) || 0;
                    }

                    // 轉字串比較
                    if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                    if (typeof bVal === 'string') bVal = bVal.toLowerCase();

                    if (aVal < bVal) return popoutSortDirection === 'asc' ? -1 : 1;
                    if (aVal > bVal) return popoutSortDirection === 'asc' ? 1 : -1;
                    return 0;
                });

                // 渲染表格內容
                tbody.innerHTML = sortedResults.map(record => {
                    // 樣式類別
                    let resultClass = 'none';
                    if (record.result === '勝利') resultClass = 'win';
                    else if (record.result === '敗北') resultClass = 'lose';
                    else if (record.result === '平手') resultClass = 'draw';

                    let turnClass = 'none';
                    if (isFirst(record.turnOrder)) turnClass = 'first';
                    else if (isSecond(record.turnOrder)) turnClass = 'second';

                    const misplayClass = getMisplayClass(record.misplay);

                    const cells = visibleColumns.map(col => {
                        let content = '';
                        const width = columnWidths[col.id] ? ` style="width: ${columnWidths[col.id]}"` : '';

                        switch (col.id) {
                            case 'date':
                                content = escapeHtml(i18n.formatDate(record.date) || '');
                                break;
                            case 'myDeck':
                            case 'opponentDeck':
                            case 'gameName':
                            case 'notes':
                                content = escapeHtml(record[col.id] || '');
                                break;
                            case 'turnOrder':
                                content = `<span class="turn-badge ${turnClass}">${escapeHtml(i18n.get(record.turnOrder) || '')}</span>`;
                                break;
                            case 'result':
                                content = `<span class="result-badge ${resultClass}">${escapeHtml(i18n.get(record.result) || '')}</span>`;
                                break;
                            case 'score':
                                content = escapeHtml(String(record.score !== undefined ? record.score : ''));
                                break;
                            case 'misplay':
                                const misplayText = escapeHtml(i18n.get(record.misplay) || '');
                                if (isPopoutMisplayNotesVisible && record.misplayNote) {
                                    content = `<span class="misplay-badge ${misplayClass}">${misplayText}</span>
                                             <span class="misplay-note-text">${escapeHtml(record.misplayNote)}</span>`;
                                } else if (record.misplayNote) {
                                    content = `<span class="misplay-badge ${misplayClass}" data-tooltip="${escapeHtml(record.misplayNote)}" style="cursor: help;">${misplayText}</span>`;
                                } else {
                                    content = `<span class="misplay-badge ${misplayClass}">${misplayText}</span>`;
                                }
                                break;
                            default: {
                                // 自訂欄位
                                const cfVal = record[col.id] || '';
                                let cfClass = 'cf-badge-none';
                                if (cfVal === '○') cfClass = 'cf-badge-circle';
                                else if (cfVal === '✕') cfClass = 'cf-badge-cross';
                                else if (cfVal === '△') cfClass = 'cf-badge-triangle';
                                content = `<span class="cf-badge ${cfClass}">${escapeHtml(cfVal || '—')}</span>`;
                                break;
                            }
                        }

                        return `<td${width}>${content}</td>`;
                    }).join('');

                    return `<tr>${cells}</tr>`;
                }).join('');
            }

            /**
             * Misplay 等級樣式
             */
            function getMisplayClass(misplay) {
                switch (misplay) {
                    case '嚴重': return 'severe';
                    case '中等': return 'medium';
                    case '輕度': return 'light';
                    default: return 'none';
                }
            }

            /**
             * 處理排序（彈出視窗）
             */
            function handlePopoutHeaderClick(field) {
                if (popoutSortField === field) {
                    popoutSortDirection = popoutSortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    popoutSortField = field;
                    popoutSortDirection = 'desc';
                }

                // 重新渲染表格
                let searchResults = [];
                try {
                    const stored = localStorage.getItem('cardBattleSearchResults');
                    if (stored) {
                        searchResults = JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Failed to load search results:', e);
                }
                renderSearchResultsTable(searchResults);

                // 廣播排序狀態變更
                if (typeof SyncManager !== 'undefined') {
                    SyncManager.broadcast(SyncManager.EventTypes.SETTINGS_CHANGED, {
                        popoutSort: { field: popoutSortField, direction: popoutSortDirection }
                    });
                }
            }

            /**
             * 初始化調整寬度（彈出視窗）
             */
            function initPopoutResize(e, field) {
                currentResizerField = field;
                const th = e.target.parentElement;
                startX = e.pageX;
                startWidth = th.offsetWidth;

                document.body.classList.add('resizing');
                document.addEventListener('mousemove', handlePopoutResizeMove);
                document.addEventListener('mouseup', stopPopoutResize);
            }

            /**
             * 設定統計摘要簡易顯示模式
             * @param {boolean} active - 是否開啟簡易模式
             */
            function setSimpleStatsMode(active) {
                const statsGrid = document.querySelector('#popout-content .stats-grid');
                const btn = document.getElementById('toggle-simple-stats-btn');

                if (!statsGrid || !btn) return;

                if (active) {
                    statsGrid.classList.add('stats-simple-mode');
                    btn.innerHTML = '📊 <span data-i18n="btn_standard_display">標準顯示</span>';
                    localStorage.setItem('statsDisplayMode', 'simple');
                } else {
                    statsGrid.classList.remove('stats-simple-mode');
                    btn.innerHTML = '📋 <span data-i18n="btn_simple_display">簡易顯示</span>';
                    localStorage.setItem('statsDisplayMode', 'standard');
                }

                // 重新應用翻譯
                if (typeof i18n !== 'undefined') {
                    i18n.translateUI();
                }

                // 更新網址參數，以便複製網址時能保持狀態
                try {
                    const url = new URL(window.location.href);
                    if (active) {
                        url.searchParams.set('simple', '1');
                    } else {
                        url.searchParams.delete('simple');
                    }
                    window.history.replaceState({}, '', url);
                    console.log(`[StatsView] 已同步更新網址參數: simple=${active ? '1' : '0'}`);
                } catch (e) {
                    console.warn('[StatsView] 無法更新網址參數 (可能是在 file:// 下執行):', e);
                }
            }

            /**
             * 切換統計摘要簡易顯示模式
             */
            function toggleSimpleStatsMode() {
                const statsGrid = document.querySelector('#popout-content .stats-grid');
                if (!statsGrid) return;

                const isCurrentlySimple = statsGrid.classList.contains('stats-simple-mode');
                setSimpleStatsMode(!isCurrentlySimple);
            }

            /**
             * 初始化統計摘要顯示模式
             */
            function initStatsDisplayMode() {
                const mode = localStorage.getItem('statsDisplayMode');
                const btn = document.getElementById('toggle-simple-stats-btn');

                if (btn && mode === 'simple') {
                    setSimpleStatsMode(true);
                }
            }

            /**
             * 顯示/隱藏簡易顯示按鈕（僅統計摘要頁面顯示）
             */
            function updateSimpleStatsButton(blockId) {
                const btn = document.getElementById('toggle-simple-stats-btn');
                if (!btn) return;

                if (blockId === 'stats-grid-wrapper') {
                    btn.style.display = 'inline-flex';
                    // 綁定點擊事件
                    btn.onclick = toggleSimpleStatsMode;
                    // 初始化顯示模式
                    setTimeout(initStatsDisplayMode, 100);
                } else {
                    btn.style.display = 'none';
                }
            }

            /**
             * 處理調整寬度移動（彈出視窗）
             */
            function handlePopoutResizeMove(e) {
                if (!currentResizerField) return;
                const diff = e.pageX - startX;
                const newWidth = Math.max(50, startWidth + diff);

                // 儲存寬度設定
                const settings = DataManager.getColumnSettings() || { visible: {}, widths: {} };
                if (!settings.widths) settings.widths = {};
                settings.widths[currentResizerField] = `${newWidth}px`;
                DataManager.saveColumnSettings(settings);

                // 即時更新該欄位寬度
                const ths = document.querySelectorAll(`th[data-col="${currentResizerField}"]`);
                const tds = document.querySelectorAll(`#search-results-table tbody tr`);

                ths.forEach(th => th.style.width = `${newWidth}px`);

                // 更新對應的 td 寬度
                const thIndex = Array.from(ths[0]?.parentElement.children || []).indexOf(ths[0]);
                if (thIndex >= 0) {
                    tds.forEach(tr => {
                        const td = tr.children[thIndex];
                        if (td) td.style.width = `${newWidth}px`;
                    });
                }

                // 廣播寬度變更（同步到主頁面）
                if (typeof SyncManager !== 'undefined') {
                    SyncManager.broadcast(SyncManager.EventTypes.SETTINGS_CHANGED, {
                        columnWidths: { [currentResizerField]: `${newWidth}px` }
                    });
                }
            }

            /**
             * 停止調整寬度（彈出視窗）
             */
            function stopPopoutResize() {
                document.body.classList.remove('resizing');
                document.removeEventListener('mousemove', handlePopoutResizeMove);
                document.removeEventListener('mouseup', stopPopoutResize);
                currentResizerField = null;
            }

            /**
             * HTML 轉義
             */
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 暴露部分函數給全域 (供 HTML inline 事件呼叫)
            window.renderScoreChart = renderScoreChart;
            window.applyRowHeight = applyRowHeight;
            window.PopoutManager = { toggle: (id) => console.log('Popout recursion prevented') }; 

            // 初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // OBS 相容性：每秒從 localStorage 輪詢最新資料
            // BroadcastChannel 只在同一瀏覽器有效，OBS 的 Chromium 是獨立實例收不到
            (function startObsPolling() {
                let lastRecordCount = -1;
                let lastRecordHash = '';

                function getRecordHash(records) {
                    if (!records || records.length === 0) return '';
                    const last = records[records.length - 1];
                    return records.length + '_' + (last.id || '') + '_' + (last.updatedAt || last.date || '');
                }

                setInterval(() => {
                    try {
                        const raw = localStorage.getItem('cardBattleRecords');
                        if (!raw) return;
                        const records = JSON.parse(raw);
                        const hash = getRecordHash(records);
                        if (hash !== lastRecordHash) {
                            lastRecordHash = hash;
                            // 資料有變化，重新渲染目前區塊
                            if (typeof renderBlock === 'function') {
                                renderBlock(records);
                            }
                        }
                    } catch (e) {
                        // 靜默忽略錯誤
                    }
                }, 1000);
            })();
        })();
    </script>
